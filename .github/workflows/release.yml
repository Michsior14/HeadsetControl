name: Release

# Publishes a signed, versioned GitHub release when a semver tag (no "v"
# prefix, e.g. 4.0.0) is pushed. Reuses the shared build-artifacts workflow,
# GPG-signs every artifact with the dedicated CI signing subkey, and attaches
# a source tarball + binaries + detached .asc signatures.
#
# Requires two repository secrets:
#   GPG_PRIVATE_KEY - armored export of the dedicated signing SUBKEY
#   GPG_PASSPHRASE  - passphrase protecting that subkey
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build and release (e.g. 4.0.0)"
        required: true
        type: string

concurrency:
  group: release-${{ github.event.inputs.tag || github.ref }}
  cancel-in-progress: false

jobs:
  # Build/package all platforms at the tagged commit
  build:
    uses: ./.github/workflows/build-artifacts.yml
    with:
      ref: ${{ github.event.inputs.tag || github.ref }}

  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ref: ${{ env.TAG }}

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          merge-multiple: true
          path: ./artifacts

      - name: Build source tarball from tag
        run: |
          git archive --format=tar.gz \
            --prefix="headsetcontrol-${TAG}/" \
            -o "artifacts/headsetcontrol-${TAG}.tar.gz" \
            "${TAG}"

      - name: Import GPG signing key
        uses: crazy-max/ghaction-import-gpg@2dc316deee8e90f13e1a351ab510b4d5bc0c82cd # v7.0.0
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}

      - name: Sign artifacts
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          cd artifacts
          # Versioned releases ship artifact + detached signature only (no .sha256)
          rm -f ./*.sha256
          shopt -s nullglob
          for f in *; do
            case "$f" in *.asc) continue;; esac
            gpg --batch --yes --pinentry-mode loopback \
              --passphrase "$GPG_PASSPHRASE" \
              --armor --detach-sign "$f"
            gpg --verify "$f.asc" "$f"
          done
          echo "Signed artifacts:"; ls -1

      - name: Create release
        uses: ncipollo/release-action@b7eabc95ff50cbeeedec83973935c8f306dfcd0b # v1.20.0
        with:
          tag: ${{ env.TAG }}
          name: ${{ env.TAG }}
          artifacts: "artifacts/*"
          generateReleaseNotes: true
          makeLatest: true
          prerelease: false
          allowUpdates: true
          # Never overwrite an existing release body on re-run (protects
          # manually curated notes); notes are still generated for new tags.
          omitBodyDuringUpdate: true
          token: ${{ secrets.GITHUB_TOKEN }}
